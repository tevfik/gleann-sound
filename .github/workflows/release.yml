name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev

      - name: Test
        run: go test -race -count=1 -timeout 60s ./...

  # ── Stub build (all platforms, no whisper.cpp / no ONNX) ──
  # Requires CGO for robotgo (keyboard injection) and malgo (audio capture).
  release-stub:
    name: Stub (${{ matrix.os-label }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            os-label: linux-amd64
            ext: ""
            archive: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            os-label: darwin-arm64
            ext: ""
            archive: tar.gz
          - runner: windows-2022
            goos: windows
            goarch: amd64
            os-label: windows-amd64
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install system dependencies (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build gleann-sound (stub)
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          BINARY="gleann-sound-stub-${{ steps.version.outputs.version }}-${{ matrix.os-label }}${{ matrix.ext }}"
          LDFLAGS="-s -w -X main.version=${{ steps.version.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" -o "$BINARY" ./cmd/gleann-sound/

      - name: Compress binary (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          tar czf "dist/gleann-sound-stub-${{ steps.version.outputs.version }}-${{ matrix.os-label }}.tar.gz" \
            gleann-sound-stub-${{ steps.version.outputs.version }}-${{ matrix.os-label }}

      - name: Compress binary (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p dist
          7z a "dist/gleann-sound-stub-${{ steps.version.outputs.version }}-${{ matrix.os-label }}.zip" \
            "gleann-sound-stub-${{ steps.version.outputs.version }}-${{ matrix.os-label }}${{ matrix.ext }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # ── Whisper.cpp build (all platforms, CGO required) ──
  release-whisper:
    name: Whisper (${{ matrix.os-label }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            os-label: linux-amd64
            ext: ""
            archive: tar.gz
            cmake-extra: ""
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            os-label: darwin-arm64
            ext: ""
            archive: tar.gz
            cmake-extra: "-DGGML_METAL=OFF -DGGML_BLAS=OFF"
          - runner: windows-2022
            goos: windows
            goarch: amd64
            os-label: windows-amd64
            ext: ".exe"
            archive: zip
            cmake-extra: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install system dependencies (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev cmake build-essential

      - name: Install system dependencies (macOS)
        if: matrix.goos == 'darwin'
        run: brew install cmake

      - name: Build whisper.cpp (CPU-only)
        shell: bash
        run: |
          WHISPER_DIR="$HOME/whisper.cpp"
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git "$WHISPER_DIR"
          mkdir -p "$WHISPER_DIR/build"
          cd "$WHISPER_DIR/build"
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$WHISPER_DIR/dist" \
            -DGGML_CUDA=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_SYCL=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            ${{ matrix.cmake-extra }}
          cmake --build . --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
          cmake --install . --config Release

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build gleann-sound (whisper)
        shell: bash
        run: |
          WHISPER_DIR="$HOME/whisper.cpp"
          BINARY="gleann-sound-${{ steps.version.outputs.version }}-${{ matrix.os-label }}${{ matrix.ext }}"
          LDFLAGS="-s -w -X main.version=${{ steps.version.outputs.version }}"

          # Platform-specific linker flags
          if [ "${{ matrix.goos }}" = "linux" ]; then
            EXTRA_LDFLAGS="-lm -lstdc++ -lpthread -lgomp"
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            EXTRA_LDFLAGS="-lm -lc++ -lpthread -framework Accelerate"
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            EXTRA_LDFLAGS="-lstdc++ -lpthread"
          fi

          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$WHISPER_DIR/dist/include" \
          CGO_LDFLAGS="-L$WHISPER_DIR/dist/lib -lwhisper -lggml -lggml-cpu -lggml-base $EXTRA_LDFLAGS" \
          go build -trimpath -tags whisper -ldflags "$LDFLAGS" -o "$BINARY" ./cmd/gleann-sound/

      - name: Compress binary (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          tar czf "dist/gleann-sound-${{ steps.version.outputs.version }}-${{ matrix.os-label }}.tar.gz" \
            gleann-sound-${{ steps.version.outputs.version }}-${{ matrix.os-label }}

      - name: Compress binary (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p dist
          7z a "dist/gleann-sound-${{ steps.version.outputs.version }}-${{ matrix.os-label }}.zip" \
            "gleann-sound-${{ steps.version.outputs.version }}-${{ matrix.os-label }}${{ matrix.ext }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # ── ONNX Runtime build (Linux amd64 only) ──
  release-onnx:
    name: ONNX (linux-amd64)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev

      - name: Install ONNX Runtime
        run: |
          ORT_VERSION="1.22.0"
          curl -sSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | sudo tar xz -C /usr/local --strip-components=1
          sudo ldconfig

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build gleann-sound (onnx)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: |
          BINARY="gleann-sound-onnx-${{ steps.version.outputs.version }}-linux-amd64"
          LDFLAGS="-s -w -X main.version=${{ steps.version.outputs.version }}"
          go build -trimpath -tags onnx -ldflags "$LDFLAGS" -o "$BINARY" ./cmd/gleann-sound/

      - name: Compress binary
        run: |
          mkdir -p dist
          tar czf "dist/gleann-sound-onnx-${{ steps.version.outputs.version }}-linux-amd64.tar.gz" \
            gleann-sound-onnx-${{ steps.version.outputs.version }}-linux-amd64

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
